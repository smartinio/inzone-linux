name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify tray test runtime
        run: command -v dbus-run-session
      - name: Install Rust and coverage tools
        run: |
          rustup toolchain install 1.97.1 --profile minimal \
            --component rustfmt,clippy,llvm-tools-preview
          cargo +1.97.1 install cargo-llvm-cov --version 0.8.6 --locked
      - name: Check formatting
        run: cargo +1.97.1 fmt --check
      - name: Lint
        run: cargo +1.97.1 clippy --all-targets --all-features --locked -- -D warnings
      - name: Test with strict coverage
        run: |
          cargo +1.97.1 llvm-cov --all-features --all-targets --workspace --locked \
            --no-default-ignore-filename-regex \
            --fail-uncovered-lines 0 \
            --fail-uncovered-functions 0 \
            --show-missing-lines
      - name: Check documented MSRV
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          cargo +1.85.0 check --all-targets --all-features --locked
